<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VidMix</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>VidMix — Local Mixer</h1>

      <div class="row">
        <label>Video:</label>
        <button id="chooseVideo">Choose Video</button>
        <span id="videoPath" class="path"></span>
      </div>

      <div class="row">
        <label>Audio Tracks:</label>
        <button id="addAudio">Add Audio Track</button>
      </div>
      <div id="audioTracks"></div>

      <div class="row">
        <label>Video Trim (seconds):</label>
        <input id="videoStart" type="number" min="0" step="0.1" placeholder="start" style="width:80px" />
        <input id="videoDuration" type="number" min="0" step="0.1" placeholder="duration" style="width:100px" />
      </div>

      <div class="row">
        <button id="saveAs">Choose Output</button>
        <span id="outputPath" class="path"></span>
      </div>

      <div class="row">
        <button id="startMix" class="primary">Start Mix</button>
      </div>

      <div class="row">
        <progress id="progress" max="100" value="0"></progress>
        <div id="status"></div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
